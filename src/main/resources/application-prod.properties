spring.application.name=chatapp
server.port=${PORT:8080}

# MongoDB Atlas Connection from Environment Variable
app.mongodb.uri=${MONGODB_URI}

# Gemini AI Configuration from Environment Variable
gemini.api.key=${GEMINI_API_KEY}

# Multipart File Upload Limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Logging Configuration
logging.level.org.springframework.data.mongodb.core.MongoTemplate=INFO
logging.level.com.chat.chatapp=INFO

# Actuator Configuration for Render Health Checks
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
